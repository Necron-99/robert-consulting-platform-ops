apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "compliance-api.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "compliance-api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
