apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ollama.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ollama.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "ollama.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/models: {{ .Values.models | toJson | sha256sum }}
    spec:
      initContainers:
        {{- range .Values.models }}
        - name: pull-{{ . | replace ":" "-" | replace "." "-" }}
          image: {{ $.Values.image.repository }}:{{ $.Values.image.tag }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Starting Ollama server for model pull..."
              ollama serve &
              OLLAMA_PID=$!
              echo "Waiting for Ollama to be ready..."
              until curl -sf http://127.0.0.1:11434/api/tags > /dev/null 2>&1; do
                sleep 2
              done
              echo "Pulling model: {{ . }}"
              ollama pull {{ . }}
              echo "Model pull complete: {{ . }}"
              kill $OLLAMA_PID
              wait $OLLAMA_PID 2>/dev/null || true
          env:
            - name: OLLAMA_MODELS
              value: /models
            - name: HOME
              value: /models
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 4Gi
              cpu: 2000m
        {{- end }}

      containers:
        - name: ollama
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["ollama", "serve"]
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_MODELS
              value: /models
            - name: HOME
              value: /models
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          volumeMounts:
            - name: models
              mountPath: /models

      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-models

      restartPolicy: Always
      terminationGracePeriodSeconds: 60
