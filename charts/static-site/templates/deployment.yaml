apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "static-site.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "static-site.selectorLabels" . | nindent 6 }}
  strategy:
    type: {{ .Values.strategy.type }}
    rollingUpdate:
      maxUnavailable: {{ .Values.strategy.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.strategy.rollingUpdate.maxSurge }}
  template:
    metadata:
      labels:
        {{- include "static-site.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when nginx config changes
        checksum/config: {{ include "static-site.nginxConfig" . | sha256sum }}
    spec:
      initContainers:
        - name: sync-content
          image: {{ .Values.s3.initImage }}
          command:
            - sh
            - -c
            - |
              echo "Syncing content from s3://$S3_BUCKET/$S3_PREFIX ..."
              aws s3 sync s3://$S3_BUCKET${S3_PREFIX:+/$S3_PREFIX} {{ .Values.s3.contentPath }} \
                --delete \
                --exact-timestamps
              echo "Sync complete: $(ls -la {{ .Values.s3.contentPath }} | wc -l) items"
              echo "Index check: $(test -f {{ .Values.s3.contentPath }}/index.html && echo 'OK' || echo 'MISSING index.html')"
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: AWS_DEFAULT_REGION
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: S3_BUCKET
            - name: S3_PREFIX
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: S3_PREFIX
                  optional: true
          volumeMounts:
            - name: content
              mountPath: {{ .Values.s3.contentPath }}

      containers:
        # -----------------------------------------------------------------------
        # Main container: nginx serving static content
        # -----------------------------------------------------------------------
        - name: nginx
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: 80
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: 80
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          volumeMounts:
            - name: content
              mountPath: {{ .Values.s3.contentPath }}
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run

        {{- if .Values.metrics.enabled }}
        # -----------------------------------------------------------------------
        # Sidecar: nginx-prometheus-exporter
        # Scrapes nginx stub_status and exposes /metrics for Prometheus
        # -----------------------------------------------------------------------
        - name: metrics
          image: {{ .Values.metrics.image.repository }}:{{ .Values.metrics.image.tag }}
          imagePullPolicy: {{ .Values.metrics.image.pullPolicy }}
          args:
            - --nginx.scrape-uri=http://localhost/nginx_status
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          resources:
            requests:
              memory: {{ .Values.metrics.resources.requests.memory }}
              cpu: {{ .Values.metrics.resources.requests.cpu }}
            limits:
              memory: {{ .Values.metrics.resources.limits.memory }}
              cpu: {{ .Values.metrics.resources.limits.cpu }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: {{ .Values.metrics.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: {{ .Values.metrics.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
        {{- end }}

      volumes:
        - name: content
          emptyDir: {}
        - name: nginx-conf
          configMap:
            name: {{ .Release.Name }}-nginx-conf
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
