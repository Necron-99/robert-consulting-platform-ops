# =============================================================================
# threat-api/values.yaml
# =============================================================================
# Default values for the threat-api Helm chart.
# Override with: helm upgrade threat-api ./charts/threat-api -f my-values.yaml
# or:            helm upgrade threat-api ./charts/threat-api --set image.tag=abc123

# -----------------------------------------------------------------------------
# Image
# -----------------------------------------------------------------------------
image:
  repository: ghcr.io/necron-99/threat-api
  tag: latest
  pullPolicy: Always

# -----------------------------------------------------------------------------
# Deployment
# -----------------------------------------------------------------------------
replicas: 1

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 200m

# -----------------------------------------------------------------------------
# Application environment
# -----------------------------------------------------------------------------
env:
  databasePath: /data/threat.db
  complianceApiUrl: https://api.compliance.robertconsulting.net
  corsOrigins: "https://threat.robertconsulting.net,https://robertconsulting.net"
  logLevel: info

# -----------------------------------------------------------------------------
# S3 init container — fetches database on pod start
# -----------------------------------------------------------------------------
s3:
  secretName: aws-threat-api-credentials
  # Secret must contain: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
  #                      AWS_DEFAULT_REGION, S3_BUCKET, S3_KEY
  initImage: amazon/aws-cli:latest

# -----------------------------------------------------------------------------
# Ingress
# -----------------------------------------------------------------------------
ingress:
  host: api.threat.robertconsulting.net
  clusterIssuer: letsencrypt-prod
  tlsSecretName: threat-api-tls
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"

# -----------------------------------------------------------------------------
# Health probes
# -----------------------------------------------------------------------------
probes:
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# -----------------------------------------------------------------------------
# Namespace
# -----------------------------------------------------------------------------
namespace: threat-api
